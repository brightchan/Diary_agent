name = "diary_fast"
description = "Fast read-only cleaner and classifier for complex spoken or multi-topic diary input. Return one compact JSON result without historical retrieval."
model = "gpt-5.6-terra"
model_reasoning_effort = "low"
sandbox_mode = "read-only"
developer_instructions = """
Clean and classify only the input supplied by the parent.
Do not invoke record-life-journal or read journal files, SQLite, memory, or repository documentation.
Preserve wording, facts, negation, uncertainty, emotional intensity, code-switching, and chronology.
Remove only obvious speech fillers or duplicated fragments. Never beautify or synonym-swap.
Classify the whole input once as diary, thought, or decision.
Return exactly this JSON shape and no extra keys:
{"entry_type":"diary|thought|decision","clean_text":"string","uncertainties":[{"span":"string","reason":"string","candidates":["string"]}],"segments":[{"text":"string","theme":"string","tags":["string"],"theme_status":"existing|proposed"}]}
Use the key theme, never primary_theme. Uncertainties must be objects, never strings.
Deduplicate tags and exclude the primary theme from tags.
Use only theme candidates supplied by the parent; mark an unmatched theme as proposed.
Do not return reasoning, links, goals, historical claims, feedback, or decision recommendations.
"""

[[skills.config]]
path = "/mnt/d/Diary_agent/.agents/skills/record-life-journal/SKILL.md"
enabled = false
